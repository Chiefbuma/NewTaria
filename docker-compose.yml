version: '3.8'

services:
  app:
    image: node:18-alpine
    container_name: newtaria-app-local
    command: sh -lc "npm run dev"
    ports:
      - "3002:3000"
    volumes:
      - .:/app
      - ../RadiantAfya/node_modules:/app/node_modules:ro
    working_dir: /app
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - newtaria-network

  mysql:
    image: mysql:8.0
    container_name: newtaria-mysql-local
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: NewTariaDB
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: newtaria_user
      MYSQL_PASSWORD: secret
    ports:
      - "3311:3306"
    volumes:
      - newtaria-dbdata:/var/lib/mysql
      - ./localhost.sql:/docker-entrypoint-initdb.d/localhost.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 10s
      retries: 10
    networks:
      - newtaria-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: newtaria-phpmyadmin-local
    restart: unless-stopped
    ports:
      - "8084:80"
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: secret
    depends_on:
      - mysql
    networks:
      - newtaria-network

networks:
  newtaria-network:
    driver: bridge

volumes:
  newtaria-dbdata:
